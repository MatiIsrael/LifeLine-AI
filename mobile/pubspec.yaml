name: lifeline_ai
description: Intelligent SOS emergency response app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  firebase_core: ^3.2.0
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.1.0
  firebase_messaging: ^15.0.3
  firebase_storage: ^12.1.0
  geolocator: ^12.0.0
  google_maps_flutter: ^2.7.0
  http: ^1.2.2
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  sensors_plus: ^6.0.1
  speech_to_text: ^7.0.0
  flutter_background_service: ^5.0.10
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1
  record: ^5.1.2
  path_provider: ^2.1.4
  geocoding: ^3.0.0
  sqflite: ^2.3.3+1
  connectivity_plus: ^6.0.5
  uuid: ^4.5.1
  flutter_blue_plus: ^1.32.12
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
